name: drift-detection

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  drift:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create backend.hcl
        run: |
          cat > backend.hcl <<EOF
          resource_group_name  = "${{ vars.TFSTATE_RESOURCE_GROUP }}"
          storage_account_name = "${{ vars.TFSTATE_STORAGE_ACCOUNT }}"
          container_name       = "${{ vars.TFSTATE_CONTAINER }}"
          key                  = "drift/global.terraform.tfstate"
          use_azuread_auth     = true
          use_oidc             = true
          tenant_id            = "${{ secrets.AZURE_TENANT_ID }}"
          client_id            = "${{ secrets.AZURE_CLIENT_ID }}"
          subscription_id      = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          EOF

      - name: Terraform Init
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Plan (Drift Check)
        run: terraform plan -detailed-exitcode || EXIT_CODE=$?

      - name: Show result
        run: |
          if [ "${EXIT_CODE}" = "2" ]; then
            echo "Configuration drift detected."
          elif [ "${EXIT_CODE}" = "1" ]; then
            echo "Terraform plan failed."
            exit 1
          else
            echo "No drift detected."
          fi