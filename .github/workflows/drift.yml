name: drift-detection

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  drift:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5
          terraform_wrapper: false

      - name: Terraform init (no backend for lightweight drift scan)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      # NOTE: full drift detection would loop over stored state files.
      # This is a scaffold that only validates config integrity.
      - name: Summary
        run: |
          echo "## Drift check summary" >> $GITHUB_STEP_SUMMARY
          echo "Config integrity verified." >> $GITHUB_STEP_SUMMARY