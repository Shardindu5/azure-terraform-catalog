name: debug-secrets

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect secret lengths and prefixes
        env:
          CID: ${{ secrets.AZURE_CLIENT_ID }}
          TID: ${{ secrets.AZURE_TENANT_ID }}
          SID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          echo "AZURE_CLIENT_ID length: ${#CID}"
          echo "AZURE_CLIENT_ID first 8: ${CID:0:8}"
          echo "AZURE_CLIENT_ID last 4:  ${CID: -4}"
          echo ""
          echo "AZURE_TENANT_ID length: ${#TID}"
          echo "AZURE_TENANT_ID first 8: ${TID:0:8}"
          echo "AZURE_TENANT_ID last 4:  ${TID: -4}"
          echo ""
          echo "AZURE_SUBSCRIPTION_ID length: ${#SID}"
          echo "AZURE_SUBSCRIPTION_ID first 8: ${SID:0:8}"
          echo "AZURE_SUBSCRIPTION_ID last 4:  ${SID: -4}"
          echo ""
          echo "Expected AZURE_CLIENT_ID       length=36, first8=211d3a4b, last4=2706"
          echo "Expected AZURE_TENANT_ID       length=36, first8=bd8fc6c8, last4=a0dd"
          echo "Expected AZURE_SUBSCRIPTION_ID length=36, first8=79f99048, last4=759f"