name: apply-manual

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: "Provisioning request ID"
        required: true
        type: string
      template_key:
        description: "Template key"
        required: true
        type: choice
        options:
          - resource-group
          - vm-linux
          - storage-account
          - aks
      subscription_id:
        description: "Azure subscription ID"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - test
          - stage
          - prod
      location:
        description: "Azure location"
        required: true
        type: choice
        options:
          - centralindia
          - eastus
          - westeurope
      resource_group_name:
        description: "Resource group name"
        required: true
        type: string
      resource_name:
        description: "Resource name"
        required: true
        type: string
      sku_or_size:
        description: "SKU or VM size"
        required: true
        type: string
      owner:
        description: "Owner"
        required: true
        type: string
      cost_center:
        description: "Cost center"
        required: true
        type: string
      payload_json:
        description: "Full JSON payload"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show request
        run: |
          echo "Request ID: ${{ inputs.request_id }}"
          echo "Template:   ${{ inputs.template_key }}"
          echo "Environment:${{ inputs.environment }}"
          echo "Location:   ${{ inputs.location }}"
          echo "Payload:    ${{ inputs.payload_json }}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ inputs.subscription_id }}

      - name: Create backend.hcl
        run: |
          cat > backend.hcl <<EOF
          resource_group_name  = "${{ vars.TFSTATE_RESOURCE_GROUP }}"
          storage_account_name = "${{ vars.TFSTATE_STORAGE_ACCOUNT }}"
          container_name       = "${{ vars.TFSTATE_CONTAINER }}"
          key                  = "requests/${{ inputs.environment }}/${{ inputs.request_id }}.terraform.tfstate"
          use_azuread_auth     = true
          use_oidc             = true
          tenant_id            = "${{ secrets.AZURE_TENANT_ID }}"
          client_id            = "${{ secrets.AZURE_CLIENT_ID }}"
          subscription_id      = "${{ inputs.subscription_id }}"
          EOF

      - name: Terraform Init
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Plan
        run: |
          terraform plan \
            -out=tfplan \
            -var="template_key=${{ inputs.template_key }}" \
            -var="subscription_id=${{ inputs.subscription_id }}" \
            -var="location=${{ inputs.location }}" \
            -var="environment=${{ inputs.environment }}" \
            -var="resource_group_name=${{ inputs.resource_group_name }}" \
            -var="resource_name=${{ inputs.resource_name }}" \
            -var="sku_or_size=${{ inputs.sku_or_size }}" \
            -var="owner=${{ inputs.owner }}" \
            -var="cost_center=${{ inputs.cost_center }}" \
            -var='tags={"application":"provisioning-engine","owner":"${{ inputs.owner }}","environment":"${{ inputs.environment }}"}'

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan