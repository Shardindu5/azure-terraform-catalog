name: Provision Azure Resource

# Use the request_id in the visible title so the webhook can correlate back
run-name: "${{ github.event.inputs.request_id }} • ${{ github.event.inputs.template_key }} • ${{ github.event.inputs.environment }}"

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: "Request ID from Provisioning Engine"
        required: true
      template_key:
        description: "resource-group | vm-linux | storage-account | aks"
        required: true
      subscription_id:
        description: "Target Azure subscription ID"
        required: true
      environment:
        description: "dev | test | stage | prod"
        required: true
      location:
        description: "Azure region"
        required: true
      resource_group_name:
        required: true
      resource_name:
        required: true
      sku_or_size:
        required: true
      owner:
        required: true
      cost_center:
        required: true
      payload_json:
        description: "Full JSON payload of the request"
        required: false

permissions:
  id-token: write   # required for OIDC federated login
  contents: read
  actions: read

env:
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ github.event.inputs.subscription_id }}

jobs:
  terraform:
    name: Terraform apply
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ github.event.inputs.subscription_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          terraform plan -out=tfplan \
            -var="template_key=${{ github.event.inputs.template_key }}" \
            -var="subscription_id=${{ github.event.inputs.subscription_id }}" \
            -var="environment=${{ github.event.inputs.environment }}" \
            -var="location=${{ github.event.inputs.location }}" \
            -var="resource_group_name=${{ github.event.inputs.resource_group_name }}" \
            -var="resource_name=${{ github.event.inputs.resource_name }}" \
            -var="sku_or_size=${{ github.event.inputs.sku_or_size }}" \
            -var="owner=${{ github.event.inputs.owner }}" \
            -var="cost_center=${{ github.event.inputs.cost_center }}" \
            -var="request_id=${{ github.event.inputs.request_id }}"

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan

      - name: Summary
        if: always()
        run: |
          echo "## Provisioning Result" >> $GITHUB_STEP_SUMMARY
          echo "- Request: ${{ github.event.inputs.request_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- Template: ${{ github.event.inputs.template_key }}" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- Resource: ${{ github.event.inputs.resource_name }}" >> $GITHUB_STEP_SUMMARY
          