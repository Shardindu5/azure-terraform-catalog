name: Provision Azure Resource

run-name: "${{ inputs.request_id }} • ${{ inputs.template_key }} • ${{ inputs.environment }}"

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: "Request ID from Provisioning Engine"
        required: true
      template_key:
        description: "resource-group | vm-linux | storage-account | aks"
        required: true
      subscription_id:
        description: "Target Azure subscription ID"
        required: true
      environment:
        description: "dev | test | stage | prod"
        required: true
      location:
        description: "Azure region"
        required: true
      resource_group_name:
        required: true
      resource_name:
        required: true
      sku_or_size:
        required: true
      owner:
        required: true
      cost_center:
        required: true
      payload_json:
        description: "Full JSON payload of the request"
        required: false

permissions:
  id-token: write
  contents: read
  actions: read

env:
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ inputs.subscription_id }}

jobs:
  terraform:
    name: Terraform apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5
          terraform_wrapper: false

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TFSTATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_SA }}" \
            -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}" \
            -backend-config="key=provisioning-engine/${{ inputs.environment }}/${{ inputs.request_id }}.tfstate" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="use_oidc=true" \
            -backend-config="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -backend-config="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -backend-config="subscription_id=${{ secrets.TFSTATE_SUBSCRIPTION_ID }}"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          terraform plan -out=tfplan \
            -var="template_key=${{ inputs.template_key }}" \
            -var="subscription_id=${{ inputs.subscription_id }}" \
            -var="environment=${{ inputs.environment }}" \
            -var="location=${{ inputs.location }}" \
            -var="resource_group_name=${{ inputs.resource_group_name }}" \
            -var="resource_name=${{ inputs.resource_name }}" \
            -var="sku_or_size=${{ inputs.sku_or_size }}" \
            -var="owner=${{ inputs.owner }}" \
            -var="cost_center=${{ inputs.cost_center }}" \
            -var="request_id=${{ inputs.request_id }}"

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan

      - name: Capture output for Windows VM password
        if: inputs.template_key == 'vm-windows'
        run: |
          terraform output -raw admin_password > /tmp/win_pass.txt || true
          echo "::add-mask::$(cat /tmp/win_pass.txt)"
          echo "## Windows VM credentials" >> $GITHUB_STEP_SUMMARY
          echo "- **Username:** azureadmin" >> $GITHUB_STEP_SUMMARY
          echo "- **Password:** stored in run summary (masked)" >> $GITHUB_STEP_SUMMARY

      - name: Summary
        if: always()
        run: |
          echo "## Provisioning Result" >> $GITHUB_STEP_SUMMARY
          echo "- **Request:** ${{ inputs.request_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Template:** ${{ inputs.template_key }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Subscription:** ${{ inputs.subscription_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource:** ${{ inputs.resource_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Location:** ${{ inputs.location }}" >> $GITHUB_STEP_SUMMARY