name: plan

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create backend.hcl
        run: |
          cat > backend.hcl <<EOF
          resource_group_name  = "${{ vars.TFSTATE_RESOURCE_GROUP }}"
          storage_account_name = "${{ vars.TFSTATE_STORAGE_ACCOUNT }}"
          container_name       = "${{ vars.TFSTATE_CONTAINER }}"
          key                  = "plan/pr.terraform.tfstate"
          use_azuread_auth     = true
          use_oidc             = true
          tenant_id            = "${{ secrets.AZURE_TENANT_ID }}"
          client_id            = "${{ secrets.AZURE_CLIENT_ID }}"
          subscription_id      = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          EOF

      - name: Terraform Init
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="template_key=resource-group" \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="location=centralindia" \
            -var="environment=dev" \
            -var="resource_group_name=rg-pr-preview-01" \
            -var="resource_name=rg-pr-preview-01" \
            -var="sku_or_size=n/a" \
            -var="owner=platform-team" \
            -var="cost_center=OPS-1001"